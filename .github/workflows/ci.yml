name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          maturin develop --extras dev
      - name: Generate dummy ONNX models
        run: python benchmarks/generate_dummy_models.py
      - name: Lint Python
        run: |
          ruff format --check python tests/python
          ruff check python tests/python
      - name: Lint Rust
        run: |
          cargo fmt --manifest-path rust/edgeadapt_core/Cargo.toml --check
          cargo clippy --manifest-path rust/edgeadapt_core/Cargo.toml -- -D warnings
      - name: Tests
        run: |
          pytest tests/python -q
          cargo test --manifest-path rust/edgeadapt_core/Cargo.toml
